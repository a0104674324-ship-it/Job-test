<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직업 성향 유형 검사</title>

<style>

body{
    font-family:'Noto Sans KR', sans-serif;
    background:#f4f6fb;
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:550px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

.progress{
    text-align:right;
    color:gray;
    margin-bottom:15px;
}

.question{
    font-size:1.2rem;
    font-weight:bold;
    line-height:1.5;
    margin-bottom:25px;
}

.option{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    background:#edf1ff;
    cursor:pointer;
    font-size:1rem;
    transition:0.2s;
}

.option:hover{
    background:#dbe4ff;
    transform:scale(1.02);
}

#result{
    text-align:center;
}

.type{
    font-size:2.3rem;
    font-weight:bold;
    color:#4a67ff;
    margin:20px 0;
}

.desc{
    background:#f3f5ff;
    padding:25px;
    border-radius:20px;
    line-height:1.8;
}

.character{
    font-size:90px;
    margin-bottom:10px;
}

.jobs{
    margin-top:20px;
    font-weight:bold;
    color:#444;
}

</style>
</head>

<body>

<div class="container">

<h1>직업 성향 유형 검사</h1>

<div id="quiz"></div>

<div id="result"></div>

</div>

type2:"A"

{

type1:"M",
type2:"A"
},

{
q:"새로운 일을 맡게 되었을 때 나는?",
a1:"익숙한 방식이 편하다",

type1:"C",
type2:"G"
},

{

a1:"안정적으로 진행한다",

type1:"C",
type2:"G"
},

{

a1:"내가 좋아하는 일",

type2:"W"
},

{

type2:"W"
},

{

a1:"창의적이고 자유로운 분위기",
a2:"체계적이고 안정적인 분위기",
type1:"D",
type2:"O"
},

{
q:"미래 직업 모습으로 더 가까운 것은?",
a1:"아이디어를 만드는 직업",
a2:"정해진 업무를 정확히 처리하는 직업",

let index = 0;

let scores = {

const results = {

character:"🧑‍💼"
},

"MCWO":{

character:"📚"
},

"MCLD":{

},

"MCLO":{

description:"사람들을 잘 이끌고 책임감 있게 조직을 관리하는 유형입니다.",
jobs:"교사, 인사관리자, 사무직 관리자",
character:"👔"
},

"MGWD":{
title:"성공 지향 도전자형",
description:"경쟁과 성장을 즐기며 목표를 이루기 위해 적극적으로 행동합니다.",
jobs:"기업가, 영업 전문가, 스타트업 대표",

},

"MGWO":{
title:"목표 지향 완벽주의형",

},

"MGLD":{

description:"새로운 아이디어를 현실로 만드는 것을 좋아하는 유형입니다.",
jobs:"광고 기획자, 크리에이티브 디렉터, PD",
character:"🎨"
},

"MGLO":{
title:"도전적인 현실주의자",
description:"행동력이 뛰어나고 위기 상황에서도 침착하게 해결합니다.",

},

"ACWD":{

"ACWO":{

},

"ACLD":{

},

},

"AGWD":{

jobs:"크리에이터, 스타트업 기획자, 여행 작가",
character:"🚀"
},

"AGWO":{
title:"독립적인 도전자형",
description:"혼자서도 새로운 길을 개척하며 자유롭게 움직이는 유형입니다.",
jobs:"파일럿, 탐험가, 해외 영업",
character:"✈️"
},

"AGLD":{
title:"자유로운 혁신가형",
description:"창의력과 도전 정신이 강하며 틀에 얽매이는 것을 싫어합니다.",
jobs:"게임 개발자, 영상 제작자, 창업가",
character:"🌟"
},

"AGLO":{
title:"모험을 즐기는 탐험가형",
description:"새로운 장소와 경험을 사랑하며 활동적인 삶을 추구합니다.",
jobs:"여행 가이드, 사진작가, 스포츠 선수",
character:"🧭"
}

};

function showQuestion(){

    if(index < questions.length){

        const q = questions[index];

        document.getElementById("quiz").innerHTML = `

        <div class="progress">
        ${index+1} / ${questions.length}
        </div>

        <div class="question">
        ${q.q}
        </div>

        <button class="option"
        onclick="selectAnswer('${q.type1}')">
        ${q.a1}
        </button>

        <button class="option"
        onclick="selectAnswer('${q.type2}')">
        ${q.a2}
        </button>

        `;
    }

    else{
        showResult();
    }
}

function selectAnswer(type){

    scores[type]++;

    index++;

    showQuestion();
}

function showResult(){

    const result =
    (scores.M >= scores.A ? "M" : "A") +
    (scores.C >= scores.G ? "C" : "G") +
    (scores.L >= scores.W ? "L" : "W") +
    (scores.D >= scores.O ? "D" : "O");

    const data = results[result];

    document.getElementById("quiz").innerHTML = "";

    document.getElementById("result").innerHTML = `

    <h2>당신의 직업 성향 유형은</h2>

    <div class="type">
    ${result}
    </div>

    <div class="desc">

    <div class="character">
    ${data.character}
    </div>

    <h3>${data.title}</h3>

    <p>
    ${data.description}
    </p>

    <div class="jobs">
    추천 직업<br><br>
    ${data.jobs}
    </div>

    </div>

    `;
}

showQuestion();

</script>

</body>
</html>
