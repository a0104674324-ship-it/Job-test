<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직업 성향 유형 검사</title>

<style>

body{
    font-family:'Noto Sans KR', sans-serif;
    background:#f4f6fb;
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:550px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

.progress{
    text-align:right;
    color:gray;
    margin-bottom:15px;
}

.question{
    font-size:1.2rem;
    font-weight:bold;
    line-height:1.5;
    margin-bottom:25px;
}

.option{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    background:#edf1ff;
    cursor:pointer;
    font-size:1rem;
    transition:0.2s;
}

.option:hover{
    background:#dbe4ff;
    transform:scale(1.02);
}

#result{
    text-align:center;
}

.type{
    font-size:2.2rem;
    font-weight:bold;
    color:#4a67ff;
    margin:20px 0;
}

.desc{
    background:#f3f5ff;
    padding:20px;
    border-radius:15px;
    line-height:1.8;
}

</style>
</head>

<body>

<div class="container">

<h1>직업 성향 유형 검사</h1>

<div id="quiz"></div>

<div id="result"></div>

</div>

<script>

const questions = [

{
q:"더 끌리는 삶은?",
a1:"돈을 많이 벌 수 있는 삶",
a2:"자유롭고 여유로운 삶",
type1:"M",
type2:"A"
},

{
q:"직업을 선택할 때 더 중요한 것은?",
a1:"높은 연봉",
a2:"워라밸과 자유",
type1:"M",
type2:"A"
},

{
q:"새로운 일을 맡게 되었을 때 나는?",
a1:"익숙한 방식이 편하다",
a2:"새로운 도전이 기대된다",
type1:"C",
type2:"G"
},

{
q:"팀 활동에서 나는 보통?",
a1:"안정적으로 진행한다",
a2:"새로운 아이디어를 시도한다",
type1:"C",
type2:"G"
},

{
q:"일을 선택할 때 더 중요한 것은?",
a1:"내가 좋아하는 일",
a2:"내가 잘하는 일",
type1:"L",
type2:"W"
},

{
q:"흥미는 없지만 잘하는 일이 있다면?",
a1:"좋아하는 일을 찾고 싶다",
a2:"잘하는 일을 계속한다",
type1:"L",
type2:"W"
},

{
q:"더 선호하는 업무 스타일은?",
a1:"창의적이고 자유로운 분위기",
a2:"체계적이고 안정적인 분위기",
type1:"D",
type2:"O"
},

{
q:"미래 직업 모습으로 더 가까운 것은?",
a1:"아이디어를 만드는 직업",
a2:"정해진 업무를 정확히 처리하는 직업",
type1:"D",
type2:"O"
}

];

let index = 0;

let scores = {
M:0,
A:0,
C:0,
G:0,
L:0,
W:0,
D:0,
O:0
};

const results = {

"MCWD":{
title:"능력 중심의 현실형 리더",
jobs:"경영인, 변호사, 의사, 금융인, CEO"
},

"MCWO":{
title:"체계적인 전문직형",
jobs:"공무원, 회계사, 행정직, 데이터 분석가"
},

"MCLD":{
title:"안정성과 창의성을 함께 추구하는 전략가형",
jobs:"기획자, 마케팅 전문가, 콘텐츠 디렉터"
},

"MCLO":{
title:"현실적이고 안정적인 관리자형",
jobs:"교사, 인사관리자, 사무직 관리자"
},

"MGWD":{
title:"성공 지향 도전자형",
jobs:"기업가, 영업 전문가, 스타트업 대표"
},

"MGWO":{
title:"목표 지향 완벽주의형",
jobs:"프로젝트 매니저, 엔지니어, 전략 컨설턴트"
},

"MGLD":{
title:"도전적인 창의형 리더",
jobs:"광고 기획자, 크리에이티브 디렉터, PD"
},

"MGLO":{
title:"도전적인 현실주의자",
jobs:"경찰, 군인, 스포츠 코치"
},

"ACWD":{
title:"현실 감각 있는 자유형",
jobs:"프리랜서, 디자이너, 유튜버"
},

"ACWO":{
title:"조용한 실무형",
jobs:"사서, 연구원, 기록관리사"
},

"ACLD":{
title:"감성적인 자유 창작형",
jobs:"작가, 일러스트레이터, 음악가"
},

"ACLO":{
title:"안정적인 워라밸형",
jobs:"상담사, 사회복지사, 교사"
},

"AGWD":{
title:"열정적인 성장형",
jobs:"크리에이터, 스타트업 기획자, 여행 작가"
},

"AGWO":{
title:"독립적인 도전자형",
jobs:"파일럿, 탐험가, 해외 영업"
},

"AGLD":{
title:"자유로운 혁신가형",
jobs:"게임 개발자, 영상 제작자, 창업가"
},

"AGLO":{
title:"모험을 즐기는 탐험가형",
jobs:"여행 가이드, 사진작가, 스포츠 선수"
}

};

function showQuestion(){

    if(index < questions.length){

        const q = questions[index];

        document.getElementById("quiz").innerHTML = `

        <div class="progress">
        ${index+1} / ${questions.length}
        </div>

        <div class="question">
        ${q.q}
        </div>

        <button class="option"
        onclick="selectAnswer('${q.type1}')">
        ${q.a1}
        </button>

        <button class="option"
        onclick="selectAnswer('${q.type2}')">
        ${q.a2}
        </button>

        `;
    }

    else{
        showResult();
    }
}

function selectAnswer(type){

    scores[type]++;

    index++;

    showQuestion();
}

function showResult(){

    const result =
    (scores.M >= scores.A ? "M" : "A") +
    (scores.C >= scores.G ? "C" : "G") +
    (scores.L >= scores.W ? "L" : "W") +
    (scores.D >= scores.O ? "D" : "O");

    const data = results[result];

    document.getElementById("quiz").innerHTML = "";

    document.getElementById("result").innerHTML = `

    <h2>당신의 직업 성향 유형은</h2>

    <div class="type">
    ${result}
    </div>

    <div class="desc">

    <h3>${data.title}</h3>

    <p>
    추천 직업:<br><br>
    ${data.jobs}
    </p>

    </div>

    `;
}

showQuestion();

</script>

</body>
</html>
